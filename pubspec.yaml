name: recurrence_picker
description: 'A Flutter widget for building RFC 5545 recurrence rules (rrule)'
homepage: https://github.com/Huluk/flutter_recurrence_picker
repository: https://github.com/Huluk/flutter_recurrence_picker
issue_tracker: https://github.com/Huluk/flutter_recurrence_picker/issues
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

topics:
  - flutter
  - widget
  - ui
  - picker
  - calendar
version: 0.3.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  collection: ^1.16.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  rrule: ^0.2.14

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '>=3.0.0 <7.0.0'

flutter:
  generate: true
  uses-material-design: true
